// Root-level build.gradle

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.google.gms:google-services:4.4.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}


// 🔥 ML KIT FIX (CORRECT DEPENDENCY FORCED)
subprojects {
    configurations.all {
        resolutionStrategy {
            force "com.google.android.gms:play-services-mlkit-document-scanner:16.0.0"
        }
    }
}